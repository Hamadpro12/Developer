<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Listing | My Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===================================
         HEADER
    ==================================== -->
    <header>

        <div class="logo">My Store</div>

        <button class="menu-btn">&#9776;</button>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="register.html"  class="register-btn">Registration</a></li>
                <li><a href="todo.html"      class="todo-btn">To-Do List</a></li>
                <li><a href="product.html"   class="product-btn">Product Listing</a></li>
                <li><a href="cart.html"      class="cart-btn">Shopping Cart</a></li>
            </ul>
        </nav>

    </header>

    <!-- ===================================
         HERO SECTION
    ==================================== -->
    <section class="hero">

        <h1>Product Listing Page</h1>
        <p>Explore our latest collection of quality products at the best prices.</p>

    </section>

    <!-- ===================================
         SEARCH & FILTER
    ==================================== -->
    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search product by name..."
        >

        <select id="categoryFilter">
            <option value="All">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Shoes">Shoes</option>
            <option value="Accessories">Accessories</option>
        </select>

    </section>

    <!-- ===================================
         PRODUCT GRID
         Cards are injected here by script.js
    ==================================== -->
    <section class="products">

        <h2>Available Products</h2>

        <div class="product-grid" id="productGrid"></div>

    </section>

    <!-- ===================================
         FOOTER
    ==================================== -->
    <footer>
        <p>&copy; 2026 My Store. All Rights Reserved.</p>
    </footer>

    <!-- ===================================
         JAVASCRIPT
         Loaded at the end so the DOM is
         fully parsed before the script runs.
    ==================================== -->
    <script src="controler.js"></script>

</body>

</html>
